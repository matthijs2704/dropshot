<style>
  #theme-frame {
    z-index: 9110 !important;
  }

  #rsw-frame-shell {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9110;
  }

  /* ── Double gold border ─────────────────────────────────────────────────
     Each side is a separate fixed line so there is no aspect-ratio
     distortion that the old single SVG background suffered from.
  ──────────────────────────────────────────────────────────────────────── */

  .rsw-border {
    position: absolute;
    pointer-events: none;
  }

  /* outer line */
  .rsw-border-outer-top,
  .rsw-border-outer-bottom {
    left:   var(--rsw-frame-inset-x, 14px);
    right:  var(--rsw-frame-inset-x, 14px);
    height: 1.5px;
    background: linear-gradient(
      90deg,
      rgba(189, 149, 110, 0.30),
      rgba(226, 210, 155, 0.90) 14%,
      rgba(242, 228, 178, 0.96) 50%,
      rgba(226, 210, 155, 0.90) 86%,
      rgba(189, 149, 110, 0.30)
    );
  }
  .rsw-border-outer-left,
  .rsw-border-outer-right {
    top:    var(--rsw-frame-inset-y, 14px);
    bottom: var(--infobar-height, 56px);
    width:  1.5px;
    background: linear-gradient(
      180deg,
      rgba(189, 149, 110, 0.30),
      rgba(226, 210, 155, 0.90) 14%,
      rgba(242, 228, 178, 0.96) 50%,
      rgba(226, 210, 155, 0.90) 86%,
      rgba(189, 149, 110, 0.30)
    );
  }

  .rsw-border-outer-top    { top:    var(--rsw-frame-inset-y, 14px); }
  .rsw-border-outer-bottom { bottom: var(--infobar-height, 56px); }
  .rsw-border-outer-left   { left:   var(--rsw-frame-inset-x, 14px); }
  .rsw-border-outer-right  { right:  var(--rsw-frame-inset-x, 14px); }

  /* inner line — 6 px inside the outer */
  .rsw-border-inner-top,
  .rsw-border-inner-bottom {
    left:   calc(var(--rsw-frame-inset-x, 14px) + 6px);
    right:  calc(var(--rsw-frame-inset-x, 14px) + 6px);
    height: 1px;
    background: linear-gradient(
      90deg,
      rgba(166, 132, 75, 0.20),
      rgba(196, 162, 110, 0.72) 14%,
      rgba(210, 180, 130, 0.80) 50%,
      rgba(196, 162, 110, 0.72) 86%,
      rgba(166, 132, 75, 0.20)
    );
  }
  .rsw-border-inner-left,
  .rsw-border-inner-right {
    top:    calc(var(--rsw-frame-inset-y, 14px) + 6px);
    bottom: calc(var(--infobar-height, 56px) + 6px);
    width:  1px;
    background: linear-gradient(
      180deg,
      rgba(166, 132, 75, 0.20),
      rgba(196, 162, 110, 0.72) 14%,
      rgba(210, 180, 130, 0.80) 50%,
      rgba(196, 162, 110, 0.72) 86%,
      rgba(166, 132, 75, 0.20)
    );
  }

  .rsw-border-inner-top    { top:    calc(var(--rsw-frame-inset-y, 14px) + 6px); }
  /* 6 px inside (above) the outer bottom border, toward content */
  .rsw-border-inner-bottom { bottom: calc(var(--infobar-height, 56px) + 6px); }
  .rsw-border-inner-left   { left:   calc(var(--rsw-frame-inset-x, 14px) + 6px); }
  .rsw-border-inner-right  { right:  calc(var(--rsw-frame-inset-x, 14px) + 6px); }

  /* ── Diamond ornaments at the midpoint of each side ────────────────────── */
  .rsw-diamond {
    position: fixed;
    width: clamp(12px, 0.85vw, 22px);
    height: clamp(12px, 0.85vw, 22px);
    background: rgba(232, 214, 158, 0.90);
    transform: rotate(45deg);
    box-shadow: 0 0 8px rgba(255, 210, 100, 0.35);
    pointer-events: none;
    z-index: 9110;
  }

  #rsw-diamond-top    {
    top:  calc(var(--rsw-frame-inset-y, 14px) - clamp(6px, 0.425vw, 11px));
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
  }
  #rsw-diamond-bottom {
    bottom: calc(var(--infobar-height, 56px) - clamp(6px, 0.425vw, 11px));
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
  }
  #rsw-diamond-left {
    left: calc(var(--rsw-frame-inset-x, 14px) - clamp(6px, 0.425vw, 11px));
    top:  50%;
    transform: translateY(-50%) rotate(45deg);
  }
  #rsw-diamond-right {
    right: calc(var(--rsw-frame-inset-x, 14px) - clamp(6px, 0.425vw, 11px));
    top:   50%;
    transform: translateY(-50%) rotate(45deg);
  }

  /* ── Vignette ───────────────────────────────────────────────────────────── */
  #rsw-vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at center, rgba(246, 201, 104, 0.028), transparent 44%),
      radial-gradient(circle at center, transparent 66%, rgba(0, 0, 0, 0.20) 100%);
  }

  /* ── Corner logos / badges ─────────────────────────────────────────────── */
  .rsw-corner-asset {
    position: fixed;
    display: block;
    height: auto;
    pointer-events: none;
    z-index: 9150;
    filter: drop-shadow(0 14px 22px rgba(0, 0, 0, 0.58));
  }

  #rsw-badge-left {
    top:  0;
    left: 0;
    width: var(--rsw-badge-left-size, 200px);
  }

  #rsw-badge-right {
    top:   0;
    right: 0;
    width: var(--rsw-badge-right-size, 178px);
  }

  #rsw-regio-logo {
    left:   0;
    bottom: 0;
    width: var(--rsw-regio-logo-size, 184px);
  }

  #rsw-event-logo {
    right:  0;
    bottom: 0;
    width: var(--rsw-event-logo-size, 340px);
  }

</style>

<div id="rsw-frame-shell" data-hoist>
  <div class="rsw-border rsw-border-outer-top"></div>
  <div class="rsw-border rsw-border-outer-bottom"></div>
  <div class="rsw-border rsw-border-outer-left"></div>
  <div class="rsw-border rsw-border-outer-right"></div>
  <div class="rsw-border rsw-border-inner-top"></div>
  <div class="rsw-border rsw-border-inner-bottom"></div>
  <div class="rsw-border rsw-border-inner-left"></div>
  <div class="rsw-border rsw-border-inner-right"></div>
  <div id="rsw-vignette"></div>
</div>

<div id="rsw-diamond-top"    class="rsw-diamond" data-hoist></div>
<div id="rsw-diamond-bottom" class="rsw-diamond" data-hoist></div>
<div id="rsw-diamond-left"   class="rsw-diamond" data-hoist></div>
<div id="rsw-diamond-right"  class="rsw-diamond" data-hoist></div>
<img id="rsw-badge-left"  class="rsw-corner-asset" src="/themes/camp/assets/rsw-badge-left.png"  alt="" data-hoist>
<img id="rsw-badge-right" class="rsw-corner-asset" src="/themes/camp/assets/rsw-badge-right.png" alt="" data-hoist>
<img id="rsw-regio-logo"  class="rsw-corner-asset" src="/themes/camp/assets/regio-logo.png"      alt="" data-hoist>
<img id="rsw-event-logo"  class="rsw-corner-asset" src="/themes/camp/assets/rsw-logo.png"        alt="" data-hoist>
