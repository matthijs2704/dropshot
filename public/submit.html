<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deel jouw moment</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/submit.css">
</head>
<body>
  <div class="wrap">
    <h1 class="title" id="event-title">Deel jouw moment</h1>
    <p class="sub" id="submit-sub">Kies hieronder of je iets voor het scherm wilt delen of een tip voor de kampkrant wilt insturen.</p>

    <div class="card" id="submit-card">
      <form id="submit-form">
        <div class="row">
          <div class="mode-switch" role="tablist" aria-label="Kies wat je wilt insturen">
            <button type="button" class="mode-btn" id="kind-screen" data-kind="screen">Voor op het scherm</button>
            <button type="button" class="mode-btn" id="kind-tip" data-kind="kampkrant_tip">Tip voor kampkrant</button>
          </div>
          <div class="mode-note" id="mode-note">
            Deel een foto of kort bericht. Na moderatie kan het op het scherm verschijnen.
          </div>
        </div>

        <div class="row">
          <label for="message" id="message-label">Bericht (optioneel)</label>
          <textarea id="message" name="message" maxlength="800" placeholder="Schrijf een kort bericht..."></textarea>
        </div>

        <div class="row">
          <label id="submitter-label" for="submitter-value">Naam</label>
          <input id="submitter-value" name="submitterValue" type="text" maxlength="120" placeholder="Optioneel">
        </div>

        <div class="row">
          <label for="photo" id="photo-label">Foto</label>
          <div class="photo-row photo-box">
            <input id="photo" name="photo" type="file" accept="image/*">
            <button type="button" id="clear-photo" class="btn btn-secondary hidden">Foto verwijderen</button>
          </div>
          <div class="submit-hint" id="photo-hint">Voeg een foto toe als je wilt.</div>
          <img id="photo-preview" class="photo-preview" alt="Preview">
        </div>

        <div class="row submit-actions" style="width: 100%; margin-top: 2rem;">
          <button id="submit-btn" class="btn" type="submit" style="width: 100%">Insturen voor scherm</button>
        </div>
      </form>

      <div id="status" class="status"></div>
    </div>

    <div id="closed-message" class="card hidden">
      Je kunt op dit moment geen inzendingen insturen.
    </div>
  </div>

  <script type="module" src="/submit/app.js"></script>
</body>
</html>
